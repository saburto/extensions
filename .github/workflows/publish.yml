name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish-colorful-footer:
    # Only run if the release tag matches the colorful-footer package
    if: startsWith(github.event.release.tag_name, 'pi-colorful-footer')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Publish @saburto/pi-colorful-footer
        run: pnpm publish --filter @saburto/pi-colorful-footer --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
